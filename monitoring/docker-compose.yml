version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus-data/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - monitor-network

  grafana:
    image: grafana/grafana-oss:10.4.1
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      ## 1. Mount โฟลเดอร์เก็บข้อมูลปกติ (ที่ถูก Ignore ใน Git)
      - ./grafana-data:/var/lib/grafana
      ## 2. [เพิ่มบรรทัดนี้] Mount โฟลเดอร์ Provisioning สำหรับใส่ Data Source อัตโนมัติ
      - ./grafana-provisioning:/etc/grafana/provisioning
    user: "472"
    networks:
      - monitor-network

networks:
  monitor-network:
    driver: bridge

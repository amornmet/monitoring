  ## 1. ดาวน์โหลดไฟล์ .msi จากหน้า GitHub Releases (prometheus/windows_exporter)
  ## 2. ดับเบิ้ลคลิกติดตั้งตามปกติ ตัว Service จะทำงานบน Port 9182 อัตโนมัติ

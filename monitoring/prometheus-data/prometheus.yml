## ==============================================================================
## PROMETHEUS GLOBAL CONFIGURATION
## ==============================================================================
global:
  scrape_interval: 15s     ## กำหนดเวลาดึงข้อมูลทุกๆ 15 วินาที
  evaluation_interval: 15s ## กำหนดเวลาประเมินผล Rule ทุกๆ 15 วินาที

## การตั้งค่าแจ้งเตือน (ถ้ามี Alertmanager)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # - <ALERTMANAGER_IP>:9093

## โหลด Rule สำหรับรัน Alerting หรือ Recording Rules
rule_files:
  # - "alert_rules.yml"

## ==============================================================================
## SCRAPE CONFIGURATIONS (Exporters & Integrations)
## ==============================================================================
scrape_configs:

  ## ----------------------------------------------------------------------------
  ## 1. Prometheus Self-Monitoring
  ## ----------------------------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]


  ## ----------------------------------------------------------------------------
  ## 2. Node Exporter (สำหรับ Monitor Linux Server: CPU, RAM, Disk, Network)
  ## ----------------------------------------------------------------------------
  ## [วิธีติดตั้ง Node Exporter บน Linux แบบ Binary]
  ## 1. ดาวน์โหลด: wget https://github.com/prometheus/node_exporter/releases/download/v1.8.1/node_exporter-1.8.1.linux-amd64.tar.gz
  ## 2. แตกไฟล์: tar -xvf node_exporter-1.8.1.linux-amd64.tar.gz
  ## 3. ย้ายไปที่ /usr/local/bin: sudo mv node_exporter-1.8.1.linux-amd64/node_exporter /usr/local/bin/
  ## 4. สร้าง Systemd Service ที่ /etc/systemd/system/node_exporter.service ใส่ค่าดังนี้:
  ##    [Unit]
  ##    Description=Node Exporter
  ##    After=network.target
  ##
  ##    [Service]
  ##    User=root
  ##    ExecStart=/usr/local/bin/node_exporter
  ##
  ##    [Install]
  ##    WantedBy=multi-user.target
  ## 5. สั่งรัน: sudo systemctl daemon-reload && sudo systemctl enable --now node_exporter
  ## ----------------------------------------------------------------------------
  - job_name: "node-exporter"
    static_configs:
      - targets: ["172.71.7.191:9100"]
        labels:
          custom_name: "pve9node1"
      - targets: ["172.71.7.192:9100"]
        labels:
          custom_name: "pve9node2"
      - targets: ["172.71.7.193:9100"]
        labels:
          custom_name: "pve9node3"


  ## ----------------------------------------------------------------------------
  ## 3. Proxmox VE Exporter (สำหรับ Monitor PVE Cluster, Node, VM และ Container)
  ## ----------------------------------------------------------------------------
  ## [วิธีติดตั้ง Proxmox Exporter ผ่าน Docker]
  ## 1. สร้างไฟล์ pve.yml สำหรับ Exporter เพื่อเก็บสิทธิ์การเข้าถึง (แนะนำสร้าง API Token บน PVE แทน Password)
  ##    default:
  ##      user: "user@pve"
  ##      token_name: "prometheus"
  ##      token_value: "xxxx-xxxx-xxxx-xxxx"
  ##      verify_ssl: false
  ## 2. รัน Exporter Container:
  ##    docker run -d -p 9221:9221 --name proxmox-exporter -v $(pwd)/pve.yml:/etc/prometheus-pve-exporter/pve.yml proms/prometheus-pve-exporter
  ## ----------------------------------------------------------------------------
  # - job_name: "proxmox"
  #   metrics_path: /pve
  #   static_configs:
  #     - targets:
  #         - "<PROXMOX_NODE_1_IP>"
  #         - "<PROXMOX_NODE_2_IP>"
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: __param_target
  #     - source_labels: __param_target
  #       target_label: instance
  #     - target_label: __address__
  #       replacement: "<PROXMOX_EXPORTER_IP>:9221" ## IP ของตัวชี้เป้าภายนอกหรือ Container ที่รัน Exporter ตัวนี้


  ## ----------------------------------------------------------------------------
  ## 4. Ceph Storage Cluster (Built-in Manager Module)
  ## ----------------------------------------------------------------------------
  ## [วิธีเปิดใช้งาน Built-in Ceph Prometheus Module]
  ## ไม่ต้องลงโปรแกรมเพิ่ม ให้รันคำสั่งนี้บน Ceph MGR Node ตัวใดตัวหนึ่ง:
  ## 1. สั่งเปิดใช้งานโมดูล: ceph mgr module enable prometheus
  ## 2. ตรวจสอบ Port (ปกติจะเปิดที่ Port 9283 อัตโนมัติบน MGR Node ที่ Active/Standby):
  ##    ceph prometheus status
  ## ----------------------------------------------------------------------------
  - job_name: "ceph-cluster"
    static_configs:
      - targets:
          - "172.71.7.191:9283"
          - "172.71.7.192:9283"
          - "172.71.7.193:9283"


  ## ----------------------------------------------------------------------------
  ## 5. Windows Exporter (สำหรับ Monitor Windows Server / Hyper-V)
  ## ----------------------------------------------------------------------------

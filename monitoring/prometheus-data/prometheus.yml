  ## ----------------------------------------------------------------------------
  ## 8. MySQLd Exporter (สำหรับ Monitor MySQL / MariaDB)
  ## ----------------------------------------------------------------------------
  ## [วิธีติดตั้ง MySQLd Exporter]
  ## 1. สร้าง User ใน MySQL:
  ##    CREATE USER 'exporter'@'localhost' IDENTIFIED BY 'Password1234' WITH MAX_USER_CONNECTIONS 3;
